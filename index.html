<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <header>
    <h1 id="title">Title here</h1>
    <p id="description">Descriptive paragraph</p>
    </header>
    <form id="survey-form">
      <div class="personal-details">
      <label id="name-label" for="name">Full Name:</label>
      <input required type="text" id="name" name="name" placeholder="Enter full name here"><br>
      <label id="email-label" for="email">Email:</label>
      <input required type="email" id="email" name="email" placeholder="Enter e-mail address"><br>
      <label id="number-label" for="number">Age (optional)</label>
      <input type="number" id="number" name="age" placeholder="Enter your age"></div>
    </form>  
  </body>
</html>
